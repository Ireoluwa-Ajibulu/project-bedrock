name: Project Bedrock CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::468582173998:role/github-actions-bedrock
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: true

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -no-color \
            -out=tfplan 2>&1 | tee plan_output.txt

      - name: Post Plan as PR Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('terraform/plan_output.txt', 'utf8');
            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n... (truncated)'
              : planOutput;
            const body = `## Terraform Plan Output 📋

            <details>
            <summary>Click to expand plan</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>

            **Triggered by:** @${{ github.actor }}
            **Action:** \`${{ github.event_name }}\`
            **Commit:** \`${{ github.sha }}\``;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  terraform-apply-and-deploy:
    name: Terraform Apply & App Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::468582173998:role/github-actions-bedrock
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Apply
        run: |
          terraform apply \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -auto-approve \
            -no-color

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.34.0'

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.21.0'

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name project-bedrock-cluster \
            --region us-east-1

      - name: Create namespace if not exists
        run: |
          kubectl create namespace retail-app --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f ../k8s/db-secrets.yaml
          kubectl apply -f ../k8s/rbac.yaml
          kubectl apply -f ../k8s/ingress.yaml

      - name: Update aws-auth configmap
        run: |
          kubectl get configmap aws-auth -n kube-system -o yaml > /tmp/aws-auth.yaml
          cat <<EOF > /tmp/aws-auth-patch.yaml
          data:
            mapUsers: |
              - userarn: arn:aws:iam::468582173998:user/bedrock-dev-view
                username: bedrock-dev-view
                groups:
                - view
          EOF
          kubectl patch configmap aws-auth -n kube-system --patch "$(cat /tmp/aws-auth-patch.yaml)"

      - name: Build Helm dependencies
        working-directory: k8s/retail-store-sample-app/src/app/chart
        run: helm dependency build

      - name: Deploy retail store app
        working-directory: k8s/retail-store-sample-app/src/app/chart
        run: |
          helm upgrade --install retail-store . \
            -n retail-app \
            -f ../../../../values-override.yaml \
            --wait \
            --timeout 10m

      - name: Install CloudWatch Observability addon
        run: |
          aws eks create-addon \
            --cluster-name project-bedrock-cluster \
            --addon-name amazon-cloudwatch-observability \
            --region us-east-1 || true

      - name: Get app URL
        run: |
          echo "Waiting for ALB URL..."
          sleep 60
          kubectl get ingress -n retail-app
